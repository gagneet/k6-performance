services:
  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - k6net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:latest
    container_name: k6-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SERVER_HTTP_PORT=3000
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/k6-dashboard.json
    ports:
      - "3100:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - k6net
    depends_on:
      influxdb:
        condition: service_healthy

  portal:
    build: ./app
    container_name: k6-portal
    environment:
      - INFLUXDB_URL=http://influxdb:8086/k6
      - GRAFANA_URL=https://grafana.gagneet.com
      - SCRIPTS_DIR=/scripts
    ports:
      - "8000:8000"
    volumes:
      - ./scripts:/scripts:ro
      - portal-data:/data
    networks:
      - k6net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb-data:
  grafana-data:
  portal-data:

networks:
  k6net:
    driver: bridge
