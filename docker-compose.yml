services:
  influxdb:
    image: influxdb:1.8
    container_name: k6-influxdb
    environment:
      - INFLUXDB_DB=k6
      - INFLUXDB_HTTP_AUTH_ENABLED=false
    ports:
      - "8086:8086"
    volumes:
      - influxdb-data:/var/lib/influxdb
    networks:
      - k6net
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8086/ping"]
      interval: 10s
      timeout: 5s
      retries: 5

  grafana:
    image: grafana/grafana-oss:latest
    container_name: k6-grafana
    environment:
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Admin
      - GF_AUTH_DISABLE_LOGIN_FORM=false
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SERVER_HTTP_PORT=3000
      - GF_DASHBOARDS_DEFAULT_HOME_DASHBOARD_PATH=/var/lib/grafana/dashboards/k6-dashboard.json
    ports:
      - "3100:3000"
    volumes:
      - grafana-data:/var/lib/grafana
      - ./grafana/provisioning:/etc/grafana/provisioning:ro
      - ./grafana/dashboards:/var/lib/grafana/dashboards:ro
    networks:
      - k6net
    depends_on:
      influxdb:
        condition: service_healthy

  portal:
    build:
      context: ./app
      # Set INSTALL_CLAUDE_CODE=1 here to bake the claude CLI into the image.
      # Leave at 0 for a slim image; install claude manually in a dev volume
      # or mount a host-installed binary if preferred.
      args:
        INSTALL_CLAUDE_CODE: "0"
    container_name: k6-portal
    environment:
      - INFLUXDB_URL=http://influxdb:8086/k6
      - GRAFANA_URL=https://grafana.gagneet.com
      - SCRIPTS_DIR=/scripts
      # Audit config — AUDIT_WORKSPACE holds per-audit state under
      # /data/audits/<audit_id>/ and the target repos under /data/audits/repos/.
      - AUDIT_WORKSPACE=/data/audits
      - RALPH_SCRIPT=/scripts/run-audit.sh
      # REPOLENS_SCRIPT must be on PATH or an absolute path. Default bare name
      # assumes operators install RepoLens into the image at build time or
      # via a custom derived Dockerfile. Set to a path (e.g. /opt/repolens/repolens.sh)
      # if you mount RepoLens as a volume.
      - REPOLENS_SCRIPT=repolens.sh
      # Hard ceiling on a single audit's wallclock time (seconds). Default 2h.
      - AUDIT_MAX_SECONDS=7200
      # Anthropic key for `claude` agent. Pass through from .env or host env.
      # Leave unset if you use browser login (only possible with a persistent
      # home dir volume — not recommended in production).
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      # OpenAI key for `codex` agent
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
    ports:
      - "8000:8000"
    volumes:
      - ./scripts:/scripts:ro
      # strata-management perf scripts accessible as "strata-management/<name>" in the portal
      - /home/gagneet/strata-management/tests/performance:/scripts/strata-management:ro
      - portal-data:/data
      # strata-management source available as an audit target under /data/audits/repos/
      - /home/gagneet/strata-management:/data/audits/repos/strata-management:ro
    networks:
      - k6net
    extra_hosts:
      - "host.docker.internal:host-gateway"
    depends_on:
      influxdb:
        condition: service_healthy

volumes:
  influxdb-data:
  grafana-data:
  portal-data:

networks:
  k6net:
    driver: bridge
